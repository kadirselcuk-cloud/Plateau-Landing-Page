<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Plateau</title>
  <script>
    // GitHub Pages SPA redirect — encodes the real path as a query-string
    // so index.html can restore it before the React router initialises.
    // Based on the technique by Rafael Pedicini (MIT).
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
